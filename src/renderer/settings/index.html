<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
    <title>小漿糖 — 設定</title>
    <link rel="stylesheet" href="./settings.css" />
  </head>
  <body>
    <div id="card">
      <header id="titlebar">
        <span class="title">⚙️ 小漿糖 設定</span>
        <button id="close-btn" title="關閉">✕</button>
      </header>

      <main id="form">
        <section>
          <h2>🧠 LLM 模型</h2>
          <label>提供者 (Provider)
            <select id="provider">
              <option value="deepseek">DeepSeek</option>
              <option value="openai">OpenAI</option>
              <option value="ollama">Ollama (本地)</option>
              <option value="custom">自訂 (OpenAI 相容)</option>
            </select>
          </label>
          <label>API 位址 (Base URL)
            <input id="baseUrl" type="text" spellcheck="false" />
          </label>
          <label>API Key
            <input id="apiKey" type="password" spellcheck="false" placeholder="sk-…（本地模型可留空）" />
          </label>
          <label>模型 (Model)
            <input id="model" type="text" spellcheck="false" />
          </label>
        </section>

        <section>
          <h2>🎨 角色外觀</h2>
          <label>角色
            <select id="character">
              <option value="custom">小漿糖 Q版插畫 (10 表情)</option>
            </select>
          </label>
          <p class="hint">切換後桌寵會立即重載。（chibi/default 等其他角色包仍在,需要時可手動改 config 的 character 欄位。）</p>
        </section>

        <section>
          <h2>🍮 個性 (Persona)</h2>
          <textarea id="persona" rows="4"></textarea>
        </section>

        <section>
          <h2>👀 行為</h2>
          <label class="row"><input id="followCursor" type="checkbox" /> 眼睛/表情跟著滑鼠反應</label>
          <label class="row"><input id="useEnvironmentContext" type="checkbox" /> 聊天時參考目前視窗/閒置狀態</label>
          <label class="row"><input id="proactive" type="checkbox" /> 主動陪伴（閒置/久坐/深夜時偶爾關心你）</label>
          <label class="row"><input id="watchClipboard" type="checkbox" /> 偵測剪貼簿錯誤並主動提議幫忙（會輪詢剪貼簿）</label>
          <p class="hint">⚠️ 預設關閉。開啟後小漿糖會持續讀取剪貼簿來判斷你是否複製了錯誤訊息；但只會「提議幫忙」，不會把內容送出，實際分析仍只在你按 Ctrl+Shift+C 時發生。</p>
          <label class="row"><input id="launchOnStartup" type="checkbox" /> 開機時自動啟動</label>
          <label>好奇反應距離 (px): <span id="proximityVal"></span>
            <input id="proximityRadius" type="range" min="60" max="400" step="10" />
          </label>
        </section>

        <section>
          <h2>⌨️ 快捷鍵</h2>
          <label>叫出聊天框 <input id="hk-chat" type="text" spellcheck="false" /></label>
          <label>分析剪貼簿 <input id="hk-clip" type="text" spellcheck="false" /></label>
          <label>顯示/隱藏桌寵 <input id="hk-pet" type="text" spellcheck="false" /></label>
          <p class="hint">格式範例:CommandOrControl+Shift+Space。改完按儲存後需重新啟動才會套用快捷鍵。</p>
        </section>
      </main>

      <footer>
        <span id="status"></span>
        <button id="save-btn">儲存</button>
      </footer>
    </div>
    <script type="module" src="./settings.ts"></script>
  </body>
</html>
